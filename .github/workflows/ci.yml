name: Integracion Continua Node.js

# 1. ¿Cuándo se ejecuta esto? Cada vez que haces un "push" al repositorio.
on:
  push:
    branches: [ "main" ]

# 2. ¿Qué trabajos (jobs) va a realizar?
jobs:
  build:
    # 3. ¿En qué sistema operativo de la nube se va a ejecutar?
    runs-on: ubuntu-latest

    # 4. Los pasos exactos que va a seguir GitHub:
    steps:
    # Paso A: Traer tu código del repositorio a esta computadora virtual
    - name: Obtener el código
      uses: actions/checkout@v4

    # Paso B: Instalar Node.js en esa computadora virtual
    - name: Instalar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Usaremos la versión 20 de Node

    # Paso C: Instalar las dependencias de tu proyecto (como Jest)
    - name: Instalar dependencias
      run: npm install

    # Paso D: Ejecutar tu prueba automatizada
    - name: Ejecutar pruebas
      run: npm test