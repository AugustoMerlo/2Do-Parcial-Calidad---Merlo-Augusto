name: Integración y Despliegue Continuo (CI/CD)

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Trae el código del repositorio
      - name: Checkout del código
        uses: actions/checkout@v4

      # 2. Prepara el entorno de Node.js
      - name: Configurar Node.js
        uses: actions/setup-node@v4

      # 3. Instala las librerías
      - name: Instalar dependencias
        run: npm install

      # 4. Ejecuta tus tests (Si esto falla, el proceso se corta aquí)
      - name: Ejecutar pruebas
        run: npm test

      # Paso 5: Desplegar en Vercel (NUEVO)
      - name: Desplegar en Entorno de Entrega
        run: npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}